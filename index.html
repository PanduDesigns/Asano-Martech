<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nexus · Martech Corporation</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@600;700;900&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-grid" aria-hidden="true"></div>
  <div class="auth-card">
    <div class="auth-brand">
      <img src="assets/martech-badge.png" alt="Martech Corporation" class="auth-brand__logo">
    </div>
    <div class="auth-brand__product">
      <span class="auth-brand__dot"></span>
      <span class="auth-brand__name">NEXUS</span>
    </div>
    <p class="auth-brand__tag">Gestor de tareas del equipo</p>

    <div class="auth-tabs" role="tablist">
      <button class="auth-tab is-active" data-tab="login" role="tab" aria-selected="true" type="button">Entrar</button>
      <button class="auth-tab" data-tab="signup" role="tab" aria-selected="false" type="button">Crear cuenta</button>
    </div>

    <form id="login-form" class="auth-form" novalidate>
      <label class="field">
        <span class="field__label">Correo</span>
        <input class="field__input" type="email" name="email" required autocomplete="email">
      </label>
      <label class="field">
        <span class="field__label">Contraseña</span>
        <input class="field__input" type="password" name="password" required autocomplete="current-password">
      </label>
      <p class="field__error" data-error></p>
      <button type="submit" class="btn btn--primary btn--block">
        <span class="btn__label">Entrar</span>
      </button>
    </form>

    <form id="signup-form" class="auth-form hidden" novalidate>
      <label class="field">
        <span class="field__label">Nombre</span>
        <input class="field__input" type="text" name="name" required autocomplete="name">
      </label>
      <label class="field">
        <span class="field__label">Correo del trabajo</span>
        <input class="field__input" type="email" name="email" required autocomplete="email">
      </label>
      <label class="field">
        <span class="field__label">Contraseña</span>
        <input class="field__input" type="password" name="password" required minlength="6" autocomplete="new-password">
      </label>
      <p class="field__hint">Mínimo 6 caracteres. La primera persona en registrarse queda como administradora del equipo.</p>
      <p class="field__error" data-error></p>
      <button type="submit" class="btn btn--primary btn--block">
        <span class="btn__label">Crear cuenta</span>
      </button>
    </form>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app-shell" class="app-shell hidden">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-col">
    <header class="topbar" id="topbar"></header>
    <main class="main-content" id="main-content">
      <div class="empty-state" id="empty-state">
        <span class="empty-state__eyebrow">— SIN PROYECTO —</span>
        <h2>Crea o selecciona un proyecto para empezar</h2>
        <p>Los proyectos organizan las tareas de tu equipo en secciones. Puedes verlas en lista o en tablero.</p>
      </div>
    </main>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-root" class="toast-root" aria-live="polite"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
